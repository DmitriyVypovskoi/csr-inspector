name: CI

on:
  push:
    branches:
      - master
    tags:
      - "v*"

  pull_request:
    branches:
      - master

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Show Go version
        run: go version

      - name: Download dependencies
        run: go mod download

      - name: Check go.mod and go.sum
        shell: bash
        run: |
          go mod tidy

          if ! git diff --exit-code -- go.mod go.sum; then
            echo
            echo "go.mod or go.sum is not up to date."
            echo "Run 'go mod tidy' locally and commit the changes."
            exit 1
          fi

      - name: Check formatting
        shell: bash
        run: |
          unformatted_files="$(gofmt -l .)"

          if [ -n "$unformatted_files" ]; then
            echo "The following Go files are not formatted:"
            echo "$unformatted_files"
            echo
            echo "Run 'gofmt -w .' locally."
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run tests with race detector
        run: go test -race -count=1 ./...

      - name: Build server
        run: go build ./cmd/server

      - name: Check Docker image build
        run: docker build --tag csr-inspector:ci .

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"

      - name: Check frontend JavaScript syntax
        run: node --check web/static/app.js

  vulnerabilities:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Scan for known vulnerabilities
        run: govulncheck ./...

  publish:
    name: Publish Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 15

    needs:
      - quality
      - vulnerabilities

    if: >-
      ${{
        github.event_name == 'push' &&
        (
          github.ref == 'refs/heads/master' ||
          startsWith(github.ref, 'refs/tags/v')
        )
      }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/dmitriyvypovskoi/csr-inspector

          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

          labels: |
            org.opencontainers.image.title=CSR Inspector
            org.opencontainers.image.description=Web application for inspecting and analyzing PKCS#10 certificate signing requests
            org.opencontainers.image.source=https://github.com/DmitriyVypovskoi/csr-inspector

      - name: Build and publish Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
services:
  csr-inspector:
    container_name: csr-inspector

    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "8080:8080"

    environment:
      HTTP_ADDRESS: ":8080"

    restart: unless-stopped

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://127.0.0.1:8080/health || exit 1"
        ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

    security_opt:
      - no-new-privileges:true